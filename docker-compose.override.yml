services:
  core:
    build:
      target: builder
    volumes:
      - ./core:/app
      - /app/node_modules
    command: npm run start:dev
    environment:
      NODE_ENV: development

  frontend:
    build:
      target: deps
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}

  postgres:
    ports:
      - "5432:5432"
