info:
  name: login
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3001/api/auth/login
  body:
    type: form-urlencoded
    data:
      - name: email
        value: admin@admin.com
      - name: password
        value: "12345678"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
